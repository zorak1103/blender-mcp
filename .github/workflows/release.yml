name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  release:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"

      - name: Patch version from tag
        run: python scripts/patch_version.py "${GITHUB_REF_NAME}"

      - name: Package addon zip
        run: zip -r "blender_mcp_addon-${GITHUB_REF_NAME}.zip" blender_addon/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: "blender_mcp_addon-${{ github.ref_name }}.zip"
          generate_release_notes: true
