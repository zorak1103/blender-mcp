name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  release:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Patch version from tag
        run: python scripts/patch_version.py "${GITHUB_REF_NAME}"

      - name: Package addon zip
        run: zip -r "blender_mcp_addon-${GITHUB_REF_NAME}.zip" blender_addon/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: "blender_mcp_addon-${{ github.ref_name }}.zip"
          generate_release_notes: true
