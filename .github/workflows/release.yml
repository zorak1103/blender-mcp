name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  release:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"

      - name: Patch version from tag
        run: python scripts/patch_version.py "${GITHUB_REF_NAME}"

      - name: Package addon zip
        run: zip -r "blender_mcp_addon-${GITHUB_REF_NAME}.zip" blender_addon/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: "blender_mcp_addon-${{ github.ref_name }}.zip"
          generate_release_notes: true
