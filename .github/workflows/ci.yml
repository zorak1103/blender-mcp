name: CI

on:
  push:
  pull_request:
  workflow_call:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "latest"

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv pip install ".[test]" ruff mypy --system

      - name: Install osv-scanner
        run: |
          curl -sSfL \
            "https://github.com/google/osv-scanner/releases/download/v2.3.5/osv-scanner_linux_amd64" \
            -o /usr/local/bin/osv-scanner
          chmod +x /usr/local/bin/osv-scanner

      - name: Scan dependencies for CVEs
        run: osv-scanner scan source --lockfile uv.lock

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy launcher.py

      - name: Unit tests
        run: pytest tests/unit/ -v --cov=blender_addon --cov=launcher --cov-fail-under=80
