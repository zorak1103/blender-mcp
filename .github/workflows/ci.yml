name: CI

on:
  push:
  pull_request:
  workflow_call:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv pip install ".[test]" ruff mypy --system

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy launcher.py

      - name: Unit tests
        run: pytest tests/unit/ -v --cov=blender_addon --cov=launcher --cov-fail-under=80
